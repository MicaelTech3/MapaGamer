<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Park</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Mapa Gamer</h1>
        <div class="buttons">
            <button onclick="showAttractions('G1')">G1</button>
            <button onclick="showAttractions('Andar2')">Andar 2</button>
            <button onclick="showAttractions('Andar3')">Andar 3</button>
            <button onclick="showAttractions('Andar4')">Andar 4</button>
        </div>
        <div id="attractions" class="attractions">
            <!-- The map and content will be loaded here -->
        </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" class="video-modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideoModal()">×</span>
            <h2 id="video-title"></h2>
            <video id="game-video" controls autoplay>
                <source id="game-video-source" src="" type="video/mp4">
                Seu navegador não suporta o elemento de vídeo.
            </video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
